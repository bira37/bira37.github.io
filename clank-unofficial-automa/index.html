<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Laura · Clank! Catacombs Automa</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   LAURA — solo automa companion for Clank! Catacombs
   Single-file HTML/CSS/JS. Mobile-first. PT/EN.
   Palette: catacomb abyss + spectral teal (Laura the ghost) + treasure gold
   ============================================================ */
:root{
  --abyss:#0c0a12;
  --crypt:#161320;
  --crypt2:#1f1a2e;
  --edge:#2c2640;
  --edge2:#3a3253;
  --spectre:#46e0c8;
  --spectre-dim:#2a9d8f;
  --spectre-glow:rgba(70,224,200,.35);
  --gold:#e3b04b;
  --bone:#ece6d6;
  --ash:#948da6;
  --blood:#d64b43;
  --blood-dim:#7e2f2b;
  --radius:14px;
  --shadow:0 10px 30px rgba(0,0,0,.45);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:
    radial-gradient(120% 80% at 50% -10%, #1a1430 0%, var(--abyss) 55%),
    var(--abyss);
  color:var(--bone);
  font-family:'Inter',system-ui,sans-serif;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  min-height:100dvh;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.wrap{max-width:520px;margin:0 auto;padding:20px 18px 48px;min-height:100dvh;display:flex;flex-direction:column}
h1,h2,h3,.display{font-family:'Cinzel',serif;letter-spacing:.02em}
button{font-family:inherit;cursor:pointer;color:inherit;border:none;background:none}
button:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--spectre);outline-offset:2px;border-radius:8px}
input{font-family:inherit}

/* ---------- top bar ---------- */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px}
.brand{display:flex;align-items:baseline;gap:10px;min-width:0}
.brand .name{font-family:'Cinzel',serif;font-weight:900;font-size:1.5rem;color:var(--bone);text-shadow:0 0 18px var(--spectre-glow)}
.brand .sub{font-size:.72rem;color:var(--ash);text-transform:uppercase;letter-spacing:.12em;white-space:nowrap}
.toolbtns{display:flex;gap:8px;align-items:center;flex-shrink:0}
.lang{display:inline-flex;border:1px solid var(--edge);border-radius:999px;overflow:hidden}
.lang button{padding:5px 11px;font-size:.74rem;font-weight:700;color:var(--ash);letter-spacing:.05em}
.lang button[aria-pressed="true"]{background:var(--spectre);color:#06231e}
.iconbtn{width:36px;height:36px;border:1px solid var(--edge);border-radius:10px;display:grid;place-items:center;color:var(--ash);font-size:1rem;background:var(--crypt)}
.iconbtn:hover{color:var(--bone);border-color:var(--edge2)}

/* ---------- setup ---------- */
#setup{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;gap:22px;padding:10px 4px 0}
.hero-name{font-family:'Cinzel',serif;font-weight:900;font-size:3.4rem;line-height:.95;color:var(--bone);text-shadow:0 0 40px var(--spectre-glow);position:relative}
.hero-name::after{content:"";position:absolute;left:50%;bottom:-14px;transform:translateX(-50%);width:64px;height:2px;background:linear-gradient(90deg,transparent,var(--spectre),transparent)}
.hero-tag{font-size:.82rem;color:var(--spectre);letter-spacing:.04em;margin-top:10px;max-width:30ch;margin-left:auto;margin-right:auto}
.intro{color:var(--ash);font-size:.95rem;max-width:38ch;margin:0 auto}
.intro b{color:var(--bone);font-weight:600}
.setup-card{background:var(--crypt);border:1px solid var(--edge);border-radius:var(--radius);padding:16px 16px;text-align:left}
.setup-card h3{font-size:.78rem;text-transform:uppercase;letter-spacing:.14em;color:var(--spectre);margin-bottom:8px}
.setup-card ul{list-style:none;font-size:.86rem;color:var(--ash);display:flex;flex-direction:column;gap:6px}
.setup-card li::before{content:"›";color:var(--spectre);margin-right:8px;font-weight:700}
.setup-card li b{color:var(--bone)}

/* ---------- primary button ---------- */
.btn-primary{
  width:100%;padding:16px;border-radius:var(--radius);
  background:linear-gradient(180deg,var(--spectre),var(--spectre-dim));
  color:#06231e;font-family:'Cinzel',serif;font-weight:700;font-size:1.05rem;letter-spacing:.04em;
  box-shadow:0 8px 24px var(--spectre-glow);transition:transform .12s ease,box-shadow .12s ease;
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 30px var(--spectre-glow)}
.btn-primary:active{transform:translateY(0)}
.btn-primary[disabled]{opacity:.45;cursor:not-allowed;box-shadow:none}
.btn-ghost{width:100%;padding:13px;border:1px solid var(--edge);border-radius:12px;color:var(--ash);font-weight:600;font-size:.9rem;background:var(--crypt)}
.btn-ghost:hover{color:var(--bone);border-color:var(--edge2)}

/* ---------- game: status ---------- */
#game{flex:1;display:flex;flex-direction:column;gap:16px}
.turncount{font-size:.74rem;color:var(--ash);letter-spacing:.1em;text-transform:uppercase;text-align:center}

/* health / escape meter — the signature element */
.meter{background:var(--crypt);border:1px solid var(--edge);border-radius:var(--radius);padding:14px 16px}
.meter .lab{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.meter .lab span{font-size:.74rem;text-transform:uppercase;letter-spacing:.12em;color:var(--ash)}
.meter .lab .val{font-family:'Cinzel',serif;font-weight:700;color:var(--bone);font-size:.95rem;letter-spacing:0}
.pips{display:flex;gap:5px}
.pip{flex:1;height:14px;border-radius:4px;background:#241f33;border:1px solid var(--edge);transition:background .25s ease,box-shadow .25s ease}
.pip.on{background:linear-gradient(180deg,var(--spectre),var(--spectre-dim));border-color:var(--spectre);box-shadow:0 0 10px var(--spectre-glow)}
.pip.crit.on{background:linear-gradient(180deg,var(--blood),var(--blood-dim));border-color:var(--blood);box-shadow:0 0 10px rgba(214,75,67,.4)}
.escaped-badge{margin-top:12px;padding:10px;border-radius:10px;background:rgba(70,224,200,.1);border:1px solid var(--spectre-dim);color:var(--spectre);font-size:.82rem;text-align:center;display:none}
.escaped .escaped-badge{display:block;animation:fadein .4s ease}

/* stat row */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:var(--crypt);border:1px solid var(--edge);border-radius:12px;padding:12px 14px}
.stat .k{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ash);margin-bottom:6px}
.stepper{display:flex;align-items:center;gap:10px}
.stepper .num{font-family:'Cinzel',serif;font-weight:700;font-size:1.5rem;color:var(--gold);min-width:1.6ch;text-align:center}
.stepper.teal .num{color:var(--spectre)}
.stepper .pm{width:30px;height:30px;border:1px solid var(--edge);border-radius:8px;color:var(--ash);font-size:1.1rem;line-height:1;display:grid;place-items:center;background:var(--crypt2)}
.stepper .pm:hover{color:var(--bone);border-color:var(--edge2)}
.stat.tap{display:flex;flex-direction:column;align-items:flex-start;gap:5px;text-align:left;width:100%;position:relative;cursor:pointer}
.stat.tap:hover{border-color:var(--edge2)}
.stat .num{font-family:'Cinzel',serif;font-weight:700;font-size:1.5rem;color:var(--gold);line-height:1}
.stat.tap.teal .num{color:var(--spectre)}
.stat .edit{position:absolute;top:11px;right:12px;font-size:.8rem;color:var(--ash);opacity:.55}
.stat.tap:hover .edit{opacity:1;color:var(--bone)}
.infobtn{position:absolute;top:10px;right:12px;width:22px;height:22px;border-radius:50%;border:1px solid var(--edge2);color:var(--ash);font-size:.75rem;font-weight:700;display:grid;place-items:center;background:var(--abyss);font-family:'Cinzel',serif}
.infobtn:hover{color:var(--bone);border-color:var(--spectre-dim)}
.infolist{list-style:none;display:flex;flex-direction:column;gap:11px;margin:8px 0 16px}
.infolist li{font-size:.88rem;color:var(--ash);padding-left:14px;position:relative;line-height:1.5}
.infolist li::before{content:"›";position:absolute;left:0;color:var(--spectre);font-weight:700}
.infolist li b{color:var(--bone)}
.score-big{position:relative;background:linear-gradient(180deg,var(--crypt2),var(--crypt));border:1px solid var(--edge2);border-radius:12px;padding:14px;text-align:center}
.score-big .k{font-size:.68rem;text-transform:uppercase;letter-spacing:.12em;color:var(--ash)}
.score-big .v{font-family:'Cinzel',serif;font-weight:900;font-size:2.4rem;color:var(--gold);text-shadow:0 0 24px rgba(227,176,75,.25);line-height:1.1}

/* secondary controls */
.secondary{display:flex;flex-direction:column;gap:10px;margin-top:2px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mini{padding:11px;border:1px solid var(--edge);border-radius:11px;background:var(--crypt);color:var(--ash);font-size:.82rem;font-weight:600;text-align:center}
.mini:hover{color:var(--bone);border-color:var(--edge2)}
.mini.danger{border-color:var(--blood-dim);color:#e8857e}
.mini.danger:hover{border-color:var(--blood);color:#fff}

/* ---------- overlay (turn sheet / score) ---------- */
.overlay{position:fixed;inset:0;background:rgba(6,4,12,.78);backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;z-index:50;padding:0}
.sheet{background:var(--crypt);border:1px solid var(--edge2);border-top-left-radius:20px;border-top-right-radius:20px;width:100%;max-width:520px;max-height:92dvh;overflow-y:auto;box-shadow:var(--shadow);animation:slideup .28s cubic-bezier(.2,.8,.2,1);padding:6px 18px calc(20px + env(safe-area-inset-bottom))}
.sheet .grip{width:40px;height:4px;border-radius:2px;background:var(--edge2);margin:10px auto 14px}
.sheet h2{font-size:1.25rem;color:var(--bone);margin-bottom:2px;display:flex;align-items:center;gap:10px}
.cardno{font-family:'Cinzel',serif;font-weight:700;font-size:.72rem;color:var(--spectre);border:1px solid var(--spectre-dim);border-radius:999px;padding:3px 10px;letter-spacing:.05em}
.di-note{font-size:.74rem;color:var(--ash);margin:8px 0 14px}
.di-note b{color:var(--gold)}

.steps{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.step{display:flex;gap:12px;background:var(--crypt2);border:1px solid var(--edge);border-radius:12px;padding:12px 13px}
.step .n{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:var(--abyss);border:1px solid var(--edge2);display:grid;place-items:center;font-family:'Cinzel',serif;font-weight:700;font-size:.8rem;color:var(--spectre)}
.step .body{flex:1;min-width:0}
.step .txt{font-size:.92rem;color:var(--bone)}
.step .hint{font-size:.78rem;color:var(--ash);margin-top:5px}
.step .txt .auto{color:var(--spectre-dim);font-style:italic;font-size:.86em}
.step.accent-clank{border-left:3px solid var(--blood)}
.step.accent-clank.minus{border-left-color:var(--spectre)}
.step.accent-loot{border-left:3px solid var(--gold)}
.step.accent-card{border-left:3px solid var(--spectre-dim)}
.step .quick{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px}
.chip{padding:6px 11px;border:1px solid var(--edge2);border-radius:999px;font-size:.76rem;font-weight:600;color:var(--ash);background:var(--abyss)}
.chip[aria-pressed="true"]{background:var(--gold);color:#231a05;border-color:var(--gold)}
.chip.teal[aria-pressed="true"]{background:var(--spectre);color:#06231e;border-color:var(--spectre)}
.inlineval{display:flex;align-items:center;gap:8px;margin-top:9px}
.inlineval label{font-size:.78rem;color:var(--ash)}
.inlineval input{width:72px;padding:7px 9px;background:var(--abyss);border:1px solid var(--edge2);border-radius:8px;color:var(--bone);font-weight:600;text-align:center;font-size:.95rem}
.refresh{background:rgba(214,75,67,.08);border:1px solid var(--blood-dim);border-radius:12px;padding:12px 13px;margin-bottom:16px}
.refresh .t{font-size:.74rem;text-transform:uppercase;letter-spacing:.1em;color:#e8857e;margin-bottom:6px;font-weight:700}
.refresh .d{font-size:.84rem;color:var(--bone)}

/* score sheet */
.ledger{display:flex;flex-direction:column;gap:1px;background:var(--edge);border:1px solid var(--edge);border-radius:12px;overflow:hidden;margin-bottom:14px}
.ledger .li{display:flex;justify-content:space-between;align-items:center;background:var(--crypt2);padding:11px 14px}
.ledger .li .k{color:var(--ash);font-size:.88rem}
.ledger .li .v{font-family:'Cinzel',serif;font-weight:700;color:var(--bone)}
.ledger .li.total{background:var(--crypt);border-top:1px solid var(--edge2)}
.ledger .li.total .k{color:var(--bone);font-weight:600}
.ledger .li.total .v{color:var(--gold);font-size:1.3rem}
.ledger .li.tapli{cursor:pointer}
.ledger .li.tapli:hover{background:var(--crypt)}
.ledger .li.tapli .v::after{content:" ✎";color:var(--ash);font-size:.8em}
.versus{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.versus .ipt{display:flex;justify-content:space-between;align-items:center;background:var(--crypt2);border:1px solid var(--edge);border-radius:12px;padding:12px 14px}
.versus .ipt label{color:var(--bone);font-size:.92rem}
.versus .ipt input{width:90px;padding:8px;background:var(--abyss);border:1px solid var(--edge2);border-radius:8px;color:var(--gold);font-family:'Cinzel',serif;font-weight:700;text-align:center;font-size:1.05rem}
.result{text-align:center;font-family:'Cinzel',serif;font-weight:900;font-size:1.5rem;padding:14px;border-radius:12px;margin-bottom:14px}
.result.win{color:var(--spectre);background:rgba(70,224,200,.1);border:1px solid var(--spectre-dim)}
.result.lose{color:#e8857e;background:rgba(214,75,67,.08);border:1px solid var(--blood-dim)}
.result.tie{color:var(--gold);background:rgba(227,176,75,.08);border:1px solid var(--gold)}
.compare{background:rgba(70,224,200,.07);border:1px solid var(--spectre-dim);border-radius:12px;padding:13px 14px;font-size:.86rem;color:var(--bone);line-height:1.55;margin-bottom:16px}
.compare b{color:var(--spectre)}

/* footer / credits */
.credits{margin-top:auto;padding-top:24px;text-align:center;font-size:.72rem;color:var(--ash);line-height:1.7}
.credits a{color:var(--spectre-dim);text-decoration:none}
.credits a:hover{color:var(--spectre)}
.credits .sep{opacity:.4;margin:0 6px}

.flag{font-size:.74rem;color:#e8857e;background:rgba(214,75,67,.07);border:1px solid var(--blood-dim);border-radius:10px;padding:10px 12px;margin-bottom:6px}

#select,#setupAdv{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;gap:18px;padding:10px 4px 0}
#gameAdv{flex:1;display:flex;flex-direction:column;gap:16px}
.botcard{display:block;width:100%;text-align:left;background:var(--crypt);border:1px solid var(--edge);border-radius:var(--radius);padding:18px;transition:border-color .15s,transform .12s}
.botcard:hover{border-color:var(--spectre-dim);transform:translateY(-1px)}
.botcard .botname{font-family:'Cinzel',serif;font-weight:700;font-size:1.4rem;color:var(--bone)}
.botcard .botdesc{font-size:.86rem;color:var(--ash);margin-top:6px;line-height:1.5}
.botcard .botmeta{font-size:.72rem;color:var(--spectre);margin-top:10px;letter-spacing:.04em;text-transform:uppercase}
.changebot{align-self:flex-start;color:var(--ash);font-size:.82rem;font-weight:600;padding:4px 0}
.changebot:hover{color:var(--spectre)}
.changebot::before{content:"‹ "}
.diffs{display:flex;flex-direction:column;gap:10px}
.diffbtn{display:block;width:100%;text-align:left;background:var(--crypt2);border:1px solid var(--edge);border-radius:12px;padding:13px 14px;transition:border-color .15s}
.diffbtn:hover{border-color:var(--spectre)}
.diffbtn .dn{font-family:'Cinzel',serif;font-weight:700;color:var(--bone);font-size:1.05rem}
.diffbtn .dd{font-size:.75rem;color:var(--ash);margin-top:4px}
.advref{background:var(--crypt2);border:1px solid var(--edge);border-radius:12px;padding:12px 13px;margin-bottom:12px}
.advref .t{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--spectre);margin-bottom:8px;font-weight:700}
.actiongrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.actbtn{padding:11px 8px;border:1px solid var(--edge2);border-radius:10px;background:var(--crypt2);color:var(--bone);font-size:.82rem;font-weight:600;text-align:center}
.actbtn:hover{border-color:var(--spectre)}
.actbtn.wide{grid-column:1/-1}
.dnote{font-size:.74rem;color:var(--ash);line-height:1.6;margin:12px 2px 0;padding-top:12px;border-top:1px solid var(--edge)}
.dnote b{color:var(--bone)}
.prow{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--crypt2);border:1px solid var(--edge);border-radius:10px;padding:10px 12px;margin-bottom:7px}
.prow:hover{border-color:var(--spectre)}
.prow:disabled{opacity:.32;cursor:not-allowed}
.prow .pn{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--abyss);border:1px solid var(--edge2);display:grid;place-items:center;font-family:'Cinzel',serif;font-weight:700;font-size:.72rem;color:var(--spectre)}
.prow .pl{font-size:.9rem;color:var(--bone);font-weight:600}
.d8result{background:rgba(70,224,200,.07);border:1px solid var(--spectre-dim);border-radius:10px;padding:11px;margin:4px 0 12px;font-size:.86rem;color:var(--bone);line-height:1.5}
.d8result b{color:var(--spectre)}
.modepill{display:inline-block;font-size:.66rem;font-weight:700;letter-spacing:.05em;padding:3px 9px;border-radius:999px;border:1px solid var(--spectre-dim);color:var(--spectre);text-transform:uppercase}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@media (min-width:520px){.overlay{align-items:center;padding:20px}.sheet{border-radius:20px}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
[hidden]{display:none!important}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <span class="name">Laura</span>
      <span class="sub" data-i="brandSub"></span>
    </div>
    <div class="toolbtns">
      <div class="lang" role="group" aria-label="Language">
        <button data-lang="pt" aria-pressed="true">PT</button>
        <button data-lang="en" aria-pressed="false">EN</button>
      </div>
      <button class="iconbtn" id="menuBtn" title="Menu" aria-label="Menu" hidden><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg></button>
    </div>
  </div>

  <!-- ============ BOT SELECT ============ -->
  <section id="select">
    <div>
      <div class="hero-name">Catacombs</div>
      <div class="hero-tag" data-i="selectTag"></div>
    </div>
    <p class="intro" data-i="selectIntro"></p>
    <button class="botcard" id="pickLaura">
      <div class="botname">Laura</div>
      <div class="botdesc" data-i="lauraDesc"></div>
      <div class="botmeta" data-i="lauraMeta"></div>
    </button>
    <button class="botcard" id="pickAdv">
      <div class="botname" data-i="advName"></div>
      <div class="botdesc" data-i="advDesc"></div>
      <div class="botmeta" data-i="advMeta"></div>
    </button>
  </section>

  <!-- ============ SETUP ============ -->
  <section id="setup">
    <button class="changebot" id="changeBotLaura" data-i="changeBot"></button>
    <div>
      <div class="hero-name">Laura</div>
      <div class="hero-tag" data-i="tag"></div>
    </div>
    <p class="intro" data-i="intro"></p>
    <div class="setup-card">
      <h3 data-i="setupTitle"></h3>
      <ul>
        <li data-i="setup1"></li>
        <li data-i="setup2"></li>
        <li data-i="setup3"></li>
        <li data-i="setup4"></li>
      </ul>
    </div>
    <button class="btn-primary" id="continueBtn" data-i="continueGame" hidden></button>
    <button class="btn-primary" id="startBtn" data-i="startGame"></button>
  </section>

  <!-- ============ GAME ============ -->
  <section id="game" hidden>
    <div class="turncount" id="turncount"></div>

    <div class="meter" id="healthMeter">
      <div class="lab">
        <span data-i="health"></span>
        <span class="val" id="healthVal">0 / 10</span>
      </div>
      <div class="pips" id="pips"></div>
      <div class="escaped-badge" id="escapedBadge"></div>
    </div>

    <div class="score-big">
      <button class="infobtn" id="infoBtn" aria-label="Info">?</button>
      <div class="k" data-i="lauraScore"></div>
      <div class="v" id="scoreBig">0</div>
    </div>

/* ============================================================
   state + persistence
   ============================================================ */
const KEY="laura_catacombs_v1";
let state=null, pendingTurn=null, adjustReopen=false, advTurn=null;

function t(k){ return T[state?.lang||'pt'][k]; }
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }
function load(){ try{ const r=localStorage.getItem(KEY); return r?JSON.parse(r):null; }catch(e){ return null; } }
function randInt(max){ // unbiased integer in 0..max-1, crypto-backed; Math.random only as fallback
  if(max<=1) return 0;
  const g=(typeof crypto!=='undefined' && crypto.getRandomValues) ? crypto : null;
  if(g){
    const limit=Math.floor(0x100000000/max)*max; // rejection sampling avoids modulo bias
    const buf=new Uint32Array(1); let x;
    do{ g.getRandomValues(buf); x=buf[0]; }while(x>=limit);
    return x%max;
  }
  return Math.floor(Math.random()*max);
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=randInt(i+1); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function detectLang(){ return (navigator.language||'').toLowerCase().startsWith('pt')?'pt':'en'; }

function newGame(){
  const lang = state?.lang || detectLang();
  state={
    lang, bot:'laura', started:true, gameOver:false, atMenu:false,
    deck: shuffle(DECK_FACEDOWN),
    discard: shuffle(DECK_FACEUP),
    rage:0, damage:0, escaped:false, mastery:false,
    gold:0, idols:0, artifact:0, loot:0,
    turn:0, yourScore:0,
  };
  pendingTurn=null; save(); render();
}

function currentDI(){ return state.discard.length ? CARDS[state.discard[state.discard.length-1]].di : 1; }

/* ============================================================
   rendering
   ============================================================ */
function applyI18n(){
  document.documentElement.lang = state.lang;
  document.querySelectorAll('[data-i]').forEach(el=>{ el.innerHTML = t(el.dataset.i); });
  document.getElementById('credits').innerHTML = t('creditsHTML');
  document.querySelectorAll('.lang button').forEach(b=>b.setAttribute('aria-pressed', String(b.dataset.lang===state.lang)));
  document.querySelector('.brand .name').textContent = !state.bot ? 'Catacombs' : (state.bot==='advanced' ? t('advName') : 'Laura');
  // turn button label depends on escaped
  document.getElementById('turnBtn').textContent = state.escaped ? t('lauraTurnEscaped') : t('lauraTurn');
}

function totalScore(){
  return state.gold + state.artifact + state.idols*5 + (state.mastery?20:0) + state.loot;
}

function renderSetup(){
  const resumable = state && state.started && !state.gameOver;
  const cont=document.getElementById('continueBtn'), start=document.getElementById('startBtn');
  cont.hidden = !resumable;
  if(resumable){ start.classList.remove('btn-primary'); start.classList.add('btn-ghost'); start.textContent=t('newGame'); }
  else { start.classList.add('btn-primary'); start.classList.remove('btn-ghost'); start.textContent=t('startGame'); }
}

function render(){
  applyI18n();
  const bot = state && state.bot;
  const inGameL = bot==='laura' && state.started && !state.atMenu;
  const inGameA = bot==='advanced' && state.started && !state.atMenu;
  document.getElementById('select').hidden = !!bot;
  document.getElementById('setup').hidden = !(bot==='laura' && !inGameL);
  document.getElementById('game').hidden = !inGameL;
  document.getElementById('setupAdv').hidden = !(bot==='advanced' && !inGameA);
  document.getElementById('gameAdv').hidden = !inGameA;
  document.getElementById('menuBtn').hidden = !(inGameL||inGameA);
  if(bot==='laura' && !inGameL){ renderSetup(); return; }
  if(bot==='advanced' && !inGameA){ renderSetupAdv(); return; }
  if(inGameL){ renderLauraGame(); return; }
  if(inGameA){ renderAdv(); return; }
}

function renderLauraGame(){
  document.getElementById('turncount').textContent = `${t('turnLabel')} ${state.turn}`;
  const pips=document.getElementById('pips'); pips.innerHTML='';
  for(let i=0;i<ESCAPE_AT;i++){
    const d=document.createElement('div');
    d.className='pip'+(i>=ESCAPE_AT-3?' crit':'')+(i<state.damage?' on':'');
    pips.appendChild(d);
  }
  document.getElementById('healthVal').textContent = `${state.damage} / ${ESCAPE_AT}`;
  document.getElementById('healthMeter').classList.toggle('escaped', state.escaped);
  document.getElementById('escapedBadge').innerHTML = t('escapedBadge');
  document.getElementById('goldNum').textContent=state.gold;
  document.getElementById('idolsNum').textContent=state.idols;
  document.getElementById('artifactNum').textContent=state.artifact;
  document.getElementById('lootNum').textContent=state.loot;
  document.getElementById('scoreBig').textContent=totalScore();
  document.getElementById('turnBtn').textContent = state.escaped ? t('lauraTurnEscaped') : t('lauraTurn');
}

/* ---- step text builder ---- */
function priorityList(pr){ return pr.map(k=>t('pr_'+k)).join(' → '); }

function buildSteps(card, di){
  const out=[];
  CARDS[card].actions.forEach(act=>{
    let cls='', txt='', hint='', extra=null, pts=false;
    switch(act.t){
      case 'clank': cls='accent-clank'; txt=t('a_clank')(act.n); break;
      case 'removeClank': cls='accent-clank minus'; txt=t('a_removeClank')(act.n); break;
      case 'clankToYou': cls='accent-clank'; txt=t('a_clankToYou')(act.n); break;
      case 'gold': cls='accent-loot'; txt=t('a_gold')(); break;
      case 'heal': txt=t('a_heal')(); break;
      case 'minorSecret': cls='accent-loot'; txt=t('a_minorSecret')(); hint=t('a_minorSecret_hint'); extra='secret'; pts=true; break;
      case 'majorSecret': cls='accent-loot'; txt=t('a_majorSecret')(); pts=true; break;
      case 'artifact': cls='accent-loot'; txt=t('a_artifact')(di); extra='artifact'; break;
      case 'market': cls='accent-loot'; txt=t('a_market')(); pts=true; break;
      case 'gainCard': cls='accent-card'; txt=t('a_gainCard')(priorityList(act.pr), t('side_'+act.tie)); hint=t('a_gainCard_hint'); pts=true; break;
      case 'gainCardDI': cls='accent-card'; txt=t('a_gainCardDI')(di, t('dir_'+act.dir)); hint=t('a_gainCard_hint'); pts=true; break;
      case 'gainSecretTome': cls='accent-card'; txt=t('a_gainSecretTome')(); hint=t('a_gainCard_hint'); pts=true; break;
    }
    out.push({cls,txt,hint,extra,pts});
  });
  return out;
}

/* ---- take a turn ---- */
function takeTurn(){
  if(state.gameOver) return;
  if(state.escaped){ showEscapedTurn(); return; }
  if(state.deck.length===0){ state.deck=shuffle(state.discard); state.discard=[]; }
  const di = currentDI();
  const card = state.deck[state.deck.length-1]; // peek; pop on finish
  const steps = buildSteps(card, di);
  pendingTurn = { card, di, eggRage:false, potionIdol:false, artifactVal:0 };

  let html = `<div class="grip"></div>`;
  html += `<h2>${t('lauraTurn')} <span class="cardno">${t('cardLabel')} ${card}</span></h2>`;
  html += `<div class="di-note">${t('diNote').replace('{di}', di)}</div>`;
  html += `<div class="steps">`;
  steps.forEach((s,i)=>{
    html += `<div class="step ${s.cls}"><div class="n">${i+1}</div><div class="body"><div class="txt">${s.txt}</div>`;
    if(s.hint) html += `<div class="hint">${s.hint}</div>`;
    if(s.extra==='secret'){
      html += `<div class="quick">
        <button class="chip" data-flag="eggRage" aria-pressed="false">${t('chip_egg')}</button>
        <button class="chip teal" data-flag="potionIdol" aria-pressed="false">${t('chip_potion')}</button>
      </div>`;
    }
    if(s.extra==='artifact'){
      html += `<div class="inlineval"><label>${t('a_artifact_lab')}</label><input type="number" inputmode="numeric" min="0" id="artifactInput" value="0"></div>`;
    }
    if(s.pts){
      html += `<div class="inlineval"><label>${t('pointsLabel')}</label><input type="number" inputmode="numeric" min="0" data-pts value="0"></div>`;
    }
    html += `</div></div>`;
  });
  html += `</div>`;
  html += `<div class="refresh"><div class="t">${t('refreshTitle')}</div><div class="d">${t('refreshDesc')}</div></div>`;
  html += `<button class="btn-primary" id="finishTurn">${t('finishTurn')}</button>`;

  const sheet=document.getElementById('turnSheet'); sheet.innerHTML=html;

  sheet.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{
    const f=c.dataset.flag; pendingTurn[f]=!pendingTurn[f]; c.setAttribute('aria-pressed',String(pendingTurn[f]));
  }));
  document.getElementById('cancelTurn').addEventListener('click',closeOverlays);
  document.getElementById('finishTurn').addEventListener('click',finishTurn);
}

function finishTurn(){
  const p=pendingTurn; if(!p) return;
  // commit deck movement
  state.deck.pop();
  state.discard.push(p.card);
  // apply deterministic effects
  CARDS[p.card].actions.forEach(act=>{
    if(act.t==='gold') state.gold += 5;
    if(act.t==='heal') state.damage = Math.max(0, state.damage-1);
    if(act.t==='artifact'){ state.rage++; }
  });
  // artifact value
  const ai=document.getElementById('artifactInput');
  if(ai){ const v=parseInt(ai.value,10)||0; if(v>0) state.artifact += v; }
  // loot points entered during the turn (cards, secrets, market items)
  document.querySelectorAll('#turnSheet [data-pts]').forEach(i=>{ state.loot += (parseInt(i.value,10)||0); });
  // secret riders
  if(p.eggRage) state.rage++;
  if(p.potionIdol && state.idols<3) state.idols++;
  state.turn++;
  pendingTurn=null;
  closeOverlays(); save(); render();
}

const ADV_DIFF = {
  1:{name:'thief',  lockpicks:3, startTome:false, tomeLimit:2, gold8:1, mult:1},
  2:{name:'master', lockpicks:4, startTome:false, tomeLimit:3, gold8:2, mult:2},

function newGameAdv(diff){
  const lang = state?.lang || detectLang();

function advMult(){ return ADV_DIFF[state.diff].mult; }

function advActions(){
  const s=state;
  return [
    ['artifact', t('act_artifact'), true],
    ['idol', t('act_idol'), s.idols < (s.hasArtifact?2:1)],

  ];

  if(advTurn.phase==='a1'){

      html+=`<button class="prow" data-act="${k}" ${en?'':'disabled'}><span class="pn">${i+1}</span><span class="pl">${label}</span></button>`;

    if(advTurn.pending==='card'){
      html+=`<div class="di-note">${t('cardScoreQ').replace(/\{r\}/g,advTurn.cardR)}</div>`;
      html+=`<div class="actiongrid">`;
      html+=`<button class="actbtn" data-card="zero">${t('isZero')}</button>`;
      html+=`<button class="actbtn" data-card="points">${t('hasPoints')}</button>`;
      html+=`</div>`;
    } else if(advTurn.pending==='tome'){
      html+=`<div class="refresh"><div class="t">${t('refreshTitle')}</div><div class="d">${t('refreshDesc')}</div></div>`;
      html+=`<button class="btn-primary" id="finishTurnAdv">${t('finishTurn')}</button>`;
    } else {
      html+=`<div class="refresh"><div class="t">${t('refreshTitle')}</div><div class="d">${t('refreshDesc')}</div></div>`;
      html+=`<button class="btn-primary" id="finishTurnAdv">${t('finishTurn')}</button>`;
    }
  }
  sheet.innerHTML=html;
  sheet.querySelectorAll('[data-act]').forEach(b=>{ if(!b.disabled) b.addEventListener('click',()=>resolveAdv(b.dataset.act)); });
  sheet.querySelectorAll('[data-card]').forEach(b=>b.addEventListener('click',()=>{
    const c=b.dataset.card;
    if(c==='zero'){ state.zeroCards++; advTurn.pending=null; save(); renderAdvTurn(); }
    else if(c==='points'){ numberPrompt(t('p_card'),v=>{ state.cardPoints+=v; advTurn.pending=null; save(); renderAdvTurn(); }); }
    else if(c==='tome'){ numberPrompt(t('p_tome'),v=>{ state.cardPoints+=v; advTurn.pending=null; save(); renderAdvTurn(); }); }
  }));
  const roll=document.getElementById('rollD8Btn'); if(roll) roll.addEventListener('click',rollD8);
  const fin=document.getElementById('finishTurnAdv'); if(fin) fin.addEventListener('click',()=>{ state.turn++; advTurn=null; closeOverlays(); save(); render(); });
  const cl=document.getElementById('cancelTurnAdv'); if(cl) cl.addEventListener('click',()=>{ advTurn=null; closeOverlays(); });
}
function resolveAdv(type){
  const s=state;
  const adv2=()=>{ advTurn.phase='a2'; rollD8(); };
  const stay=()=>{ save(); renderAdvTurn(); };
  switch(type){
    case 'artifact': numberPrompt(t('p_artifact'),v=>{ s.artifact+=v; s.hasArtifact=true; s.mode='returning'; s.rage++; adv2(); }); break;
    case 'idol': { const cap=s.hasArtifact?2:1; if(s.idols<cap) s.idols++; adv2(); } break;
    case 'amulet': s.hasBloodAmulet=true; s.damage=Math.max(0,s.damage-2); adv2(); break;
    case 'healHi':
    case 'heal': s.damage=Math.max(0,s.damage-1); adv2(); break;
    case 'chest': if(s.lockpicks>0)s.lockpicks--; numberPrompt(t('p_chest'),v=>{ s.loot+=v; adv2(); }); break;
    case 'library': if(s.lockpicks>0)s.lockpicks--; s.tomes=(s.tomes||0)+1; adv2(); break;
    case 'prison': if(s.lockpicks>0)s.lockpicks--; numberPrompt(t('p_prison'),v=>{ s.loot+=v; adv2(); }); break;
    case 'crown': choiceModal(t('crownWhich'),[
        {label:t('crown10'),cb:()=>{s.loot+=3;s.hasCrown=true;adv2();}},
        {label:t('crown9'),cb:()=>{s.loot+=2;s.hasCrown=true;adv2();}},
        {label:t('crown8'),cb:()=>{s.loot+=1;s.hasCrown=true;adv2();}},
      ]); break;
    case 'kit': s.hasBurglarsKit=true; s.lockpicks+=2; adv2(); break;
    case 'minor': choiceModal(t('minorWhich'),[
        {label:t('ms_egg'),cb:()=>{s.rage++;s.loot+=3;adv2();}},
        {label:t('ms_lock'),cb:()=>{s.lockpicks++;adv2();}},
        {label:t('ms_heal'),cb:()=>{s.damage=Math.max(0,s.damage-1);adv2();}},
        {label:t('ms_treasure'),cb:()=>{s.gold+=2;adv2();}},
        {label:t('ms_other'),cb:()=>{s.minorUnused++;adv2();}},
      ]); break;
    case 'wayshrine': s.wayshrines++; s.gold+=s.wayshrines; adv2(); break;
    case 'gold': numberPrompt(t('p_gold'),v=>{ s.gold+=v; adv2(); }); break;
    case 'discover': {
      const rot = [0,90,180,270][randInt(4)];
      const sides=['n','e','s','w'];
      for(let i=sides.length-1;i>0;i--){ const j=randInt(i+1); const tmp=sides[i]; sides[i]=sides[j]; sides[j]=tmp; }
      const order = sides.map(x=>t('ord_'+x)).join(' → ');
      choiceModal(t('act_discover'),[{label:'OK',cb:stay}], t('discoverNote').replace('{rot}', rot).replace('{order}', order));
    } break;
    case 'noreward': adv2(); break;
    case 'crypt': s.escaped=true; s.mastery=true; s.turn++; advTurn=null; closeOverlays(); save(); render(); break;
  }
}
function resolveCardRoll(r, lead){
  const s=state;
  advTurn.rolled=true;
  if(s.damage>=5 && !s.escaped){ s.gold+=1; advTurn.d8text=lead+'<br>'+t('out_cardGold'); advTurn.pending=null; save(); renderAdvTurn(); }
  else { advTurn.d8text=lead+'<br>'+t('out_card').replace(/\{r\}/g,r); advTurn.pending='card'; advTurn.cardR=r; save(); renderAdvTurn(); }
}
function rollD8(){
  const s=state, D=ADV_DIFF[s.diff];
  advTurn.rolled=true; advTurn.pending=null;
  const r=randInt(8)+1;
  if(r<=6){ resolveCardRoll(r, t('rollLead').replace('{r}',r)); }
  else if(r===7){
    if(s.tomesA2 < D.tomeLimit){ s.tomesA2++; s.tomes=(s.tomes||0)+1; advTurn.d8text=t('rollLead').replace('{r}',7)+'<br>'+t('out_tome'); save(); renderAdvTurn(); }
    else { let r2; do{ r2=randInt(8)+1; }while(r2===7);
      const lead=t('tomeLimitLead').replace('{r}',r2);
      if(r2===8){ s.gold+=D.gold8; advTurn.d8text=lead+'<br>'+t('out_gold').replace('{g}',D.gold8); save(); renderAdvTurn(); }
      else resolveCardRoll(r2, lead);
    }
  } else { s.gold+=D.gold8; advTurn.d8text=t('rollLead').replace('{r}',8)+'<br>'+t('out_gold').replace('{g}',D.gold8); save(); renderAdvTurn(); }
}

    <div class="li tapli" data-adj="cardPoints"><span class="k">${t('li_cards')}</span><span class="v">${s.cardPoints}</span></div>
    <div class="li"><span class="k">${t('li_tomes')} ×${s.tomes||0} (×7)</span><span class="v">${(s.tomes||0)*7}</span></div>
    <div class="li"><span class="k">${t('li_minor')} ×${s.minorUnused} (×${m})</span><span class="v">${s.minorUnused*m}</span></div>
    <div class="li tapli" data-adj="loot"><span class="k">${t('li_loot')}</span><span class="v">${s.loot}</span></div>
    <div class="li"><span class="k">${t('li_mastery')}</span><span class="v">${s.mastery?20:0}</span></div>
    <div class="li total"><span class="k">${t('li_totalAdv')}</span><span class="v">${lt}</span></div>
  </div>`;
  html+=`<div class="di-note" style="margin-bottom:14px">${t('advScoreNote')}</div>`;
  html+=`<div class="compare">${t('compareNoteAdv')}</div>`;
  html+=`<button class="btn-primary" id="newGameBtn">${t('newGame')}</button>`;
  sheet.innerHTML=html;
  document.getElementById('scoreOverlay').hidden=false;
  sheet.querySelectorAll('.tapli').forEach(el=>el.addEventListener('click',()=>openAdjust(el.dataset.adj, true)));
  document.getElementById('newGameBtn').addEventListener('click',()=>{ closeOverlays(); state={lang:state.lang}; save(); render(); });
}

/* ============================================================
   events
   ============================================================ */
document.querySelectorAll('.lang button').forEach(b=>b.addEventListener('click',()=>{
  if(!state) state={lang:b.dataset.lang};
  state.lang=b.dataset.lang; save(); render();
}));
document.getElementById('startBtn').addEventListener('click',newGame);
document.getElementById('turnBtn').addEventListener('click',takeTurn);
document.getElementById('dragonBtn').addEventListener('click',showDragon);
document.getElementById('escBtn').addEventListener('click',()=>endGame(true));
document.getElementById('koBtn').addEventListener('click',()=>endGame(false));
document.getElementById('menuBtn').addEventListener('click',()=>{ closeOverlays(); state.atMenu=true; save(); render(); });
document.getElementById('continueBtn').addEventListener('click',()=>{ state.atMenu=false; save(); render(); });
document.querySelectorAll('.stat.tap').forEach(b=>b.addEventListener('click',()=>openAdjust(b.dataset.stat)));
document.getElementById('infoBtn').addEventListener('click',openInfo);
// --- bot selection + advanced wiring ---
document.getElementById('pickLaura').addEventListener('click',()=>{ state.bot='laura'; state.started=false; save(); render(); });
document.getElementById('pickAdv').addEventListener('click',()=>{ state.bot='advanced'; state.started=false; save(); render(); });
const toSelect=()=>{ state={lang:state.lang}; pendingTurn=null; advTurn=null; save(); render(); };
document.getElementById('changeBotLaura').addEventListener('click',toSelect);
document.getElementById('changeBotAdv').addEventListener('click',toSelect);
document.getElementById('continueAdvBtn').addEventListener('click',()=>{ state.atMenu=false; save(); render(); });
document.getElementById('advTurnBtn').addEventListener('click',takeTurnAdv);
document.getElementById('advDragonBtn').addEventListener('click',showDragon);
document.getElementById('advEscBtn').addEventListener('click',()=>endGame(true));
document.getElementById('advKoBtn').addEventListener('click',()=>endGame(false));
document.getElementById('advInfoBtn').addEventListener('click',openInfo);
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{
  if(e.target!==o) return;
  if(o.id==='adjustOverlay'){ o.hidden=true; if(adjustReopen) showScore(); return; }
  if(o.id==='overlay' && advTurn && advTurn.phase==='a2') return;
  closeOverlays();
}));

/* ============================================================
   boot
   ============================================================ */
(function(){
  const saved=load();
  if(saved){
    state=saved;
    if(state.started && !state.bot) state.bot='laura'; // migrate pre-bot-selection saves
    if(state.started && state.gameOver){ render(); showScore(); }
    else render();
  } else { state={lang:detectLang()}; render(); }
})();
</script>
</body>
</html>
